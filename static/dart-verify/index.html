<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DART 수치 검증</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --surface: #ffffff;
      --border: #d9dee7;
      --text: #172033;
      --muted: #607087;
      --accent: #1f6feb;
      --accent-soft: #eaf2ff;
      --warn: #b7791f;
      --warn-soft: #fff6dc;
      --font: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      letter-spacing: 0;
    }
    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    h1 {
      margin: 0;
      font-size: 17px;
      line-height: 1.3;
    }
    .status-pill {
      min-width: 148px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--muted);
      padding: 6px 10px;
      text-align: center;
      font-size: 12px;
      font-weight: 700;
    }
    .workspace {
      display: grid;
      grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
      gap: 18px;
      padding: 18px;
      min-height: 0;
    }
    .input-panel {
      align-self: start;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .drop-zone {
      min-height: 220px;
      display: grid;
      place-items: center;
      padding: 20px;
      border: 2px dashed #b8c3d2;
      margin: 14px;
      border-radius: 8px;
      background: #fbfcfe;
      cursor: pointer;
      text-align: center;
    }
    .drop-zone:focus {
      outline: 3px solid var(--accent-soft);
      border-color: var(--accent);
    }
    .drop-zone.drag-over {
      background: var(--accent-soft);
      border-color: var(--accent);
    }
    .drop-title {
      display: block;
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .drop-sub {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }
    .file-input {
      position: absolute;
      inline-size: 1px;
      block-size: 1px;
      opacity: 0;
      pointer-events: none;
    }
    .error-details {
      margin: 0;
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      background: var(--warn-soft);
      color: var(--warn);
      overflow: auto;
      white-space: pre-wrap;
      max-height: 220px;
      font-size: 12px;
    }
    .result-panel {
      min-width: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: auto;
    }
    .result-placeholder {
      min-height: 360px;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--muted);
      text-align: center;
    }
    @media (max-width: 860px) {
      header {
        align-items: flex-start;
        flex-direction: column;
      }
      .status-pill {
        width: 100%;
        text-align: left;
      }
      .workspace {
        grid-template-columns: 1fr;
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header>
      <h1>DART 수치 검증</h1>
      <div class="status-pill" id="status">엔진 로딩 중...</div>
    </header>
    <main class="workspace">
      <section class="input-panel" aria-label="파일 입력">
        <div class="drop-zone" id="drop-zone" role="button" tabindex="0">
          <span>
            <span class="drop-title">HTML/DSD 파일 선택</span>
            <span class="drop-sub">DART 원문 파일을 여기에 놓거나 클릭하세요.</span>
          </span>
        </div>
        <input class="file-input" id="file-input" type="file" accept=".html,.htm,.dsd,text/html">
        <pre class="error-details" id="details" hidden></pre>
      </section>
      <section class="result-panel" aria-label="검증 결과">
        <div id="result">
          <div class="result-placeholder">검증 결과가 여기에 표시됩니다.</div>
        </div>
      </section>
    </main>
  </div>
  <script src="vendor/pyodide/pyodide.js"></script>
  <script src="app.js" type="module"></script>
</body>
</html>
